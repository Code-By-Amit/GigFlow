services:
  backend:
    build: ./server

    container_name: smart-leads-backend

    ports:
      - "3000:3000"

    volumes:
      - ./server:/app
      - /app/node_modules

    env_file:
      - ./server/.env

    depends_on:
      - mongo

  frontend:
    build: ./client

    container_name: smart-leads-frontend

    ports:
      - "5173:5173"  
    
    volumes:
      - ./client:/app
      - /app/node_modules
    
    env_file:
      - ./client/.env
    
    depends_on:
      - backend
    
  mongo:
    image: mongo

    container_name: smart-leads-mongo

    ports:
      - "27018:27017"

    volumes:
      - mongo_data:/data/db
    

volumes:
  mongo_data:
  